<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blood Bank</title>

  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div class="container">

    <h1>Blood Bank</h1>

    <div class="form-box">

      <input type="text" id="name" placeholder="Full Name">

      <input type="text" id="phone" placeholder="Phone Number">

      <input type="email" id="email" placeholder="Email">

      <input type="password" id="password" placeholder="Password">

      <select id="blood">
        <option value="">Select Blood Group</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>O+</option>
        <option>O-</option>
        <option>AB+</option>
        <option>AB-</option>
      </select>

      <input type="text" id="division" placeholder="Division">

      <input type="text" id="district" placeholder="District">

      <input type="text" id="thana" placeholder="Thana">

      <label>Last Blood Donate Date</label>

      <input type="date" id="donateDate">

      <select id="status">
        <option value="available">Available</option>
        <option value="unavailable">Unavailable</option>
      </select>

      <button onclick="createAccount()">Create Account</button>

    </div>

    <div id="users"></div>

  </div>

  <script>

    function createAccount(){

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      let blood = document.getElementById("blood").value;
      let division = document.getElementById("division").value;
      let district = document.getElementById("district").value;
      let thana = document.getElementById("thana").value;
      let donateDate = document.getElementById("donateDate").value;
      let status = document.getElementById("status").value;

      let today = new Date();
      let lastDonate = new Date(donateDate);

      let diffTime = today - lastDonate;

      let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

      let countdown = "";

      if(status === "available"){
        countdown = diffDays + 1 + " Days Ascending";
      }else{
        countdown = 120 - diffDays + " Days Remaining";
      }

      let colorClass = status === "available" ? "available" : "unavailable";

      let card = `
      
      <div class="card">

        <h2>${name}</h2>

        <p><strong>Phone:</strong> ${phone}</p>

        <p><strong>Email:</strong> ${email}</p>

        <p><strong>Blood Group:</strong> ${blood}</p>

        <p><strong>Location:</strong> ${division}, ${district}, ${thana}</p>

        <p><strong>Blood Given:</strong> ${diffDays} days ago</p>

        <p class="${colorClass}">
          ${status.toUpperCase()}
        </p>

        <p><strong>Countdown:</strong> ${countdown}</p>

      </div>

      `;

      document.getElementById("users").innerHTML += card;

      document.querySelectorAll("input").forEach(input => input.value = "");

    }

  </script>

</body>
</html>
